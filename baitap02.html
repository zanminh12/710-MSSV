<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Bài 2</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <h2 style="text-align: center">🧾 Đăng ký</h2>

    <form onsubmit="return validate();">
      <input type="text" id="name" placeholder="Tên" /><br />
      <input type="email" id="email" placeholder="Email" /><br />
      <input type="password" id="pass" placeholder="Mật khẩu" /><br />

      <label> <input type="checkbox" id="agree" /> Đồng ý điều khoản </label
      ><br /><br />

      <button type="submit">Đăng ký</button>
    </form>

    <script>
      function validate() {
        let email = document.getElementById("email").value;
        let pass = document.getElementById("pass").value;
        let agree = document.getElementById("agree").checked;

        let regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!regex.test(email)) {
          alert("❌ Email không hợp lệ");
          return false;
        }

        if (pass.length < 8) {
          alert("❌ Mật khẩu >= 8 ký tự");
          return false;
        }

        if (!agree) {
          alert("❌ Phải đồng ý điều khoản");
          return false;
        }

        localStorage.setItem("user", email);

        alert("🎉 Đăng ký thành công!");
        return true;
      }
    </script>
  </body>
</html>
